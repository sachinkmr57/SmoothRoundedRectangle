name: Build & publish DocC (no SwiftPM plugin)

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-publish:
    name: Build DocC -> Publish to GitHub Pages
    runs-on: macos-latest
    steps:

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Detect Xcode project/workspace and prepare variables
      id: detect
      run: |
        set -eux
        OUTDIR=docs
        DERIVED=build
        REPO_NAME="${GITHUB_REPOSITORY##*/}"
        HOSTING_BASE="/${REPO_NAME}/"
        WORKSPACE_PATH=""
        XCODE_PROJ=$(find Demo -maxdepth 2 -type d -name '*.xcodeproj' -print -quit || true)
        XCODE_WORKSPACE=$(find Demo -maxdepth 2 -type d -name '*.xcworkspace' -print -quit || true)
        if [ -n "$XCODE_WORKSPACE" ]; then
          WORKSPACE_PATH="-workspace $XCODE_WORKSPACE"
        elif [ -n "$XCODE_PROJ" ]; then
          WORKSPACE_PATH="-project $XCODE_PROJ"
        else
          XCODE_PROJ_ROOT=$(find . -maxdepth 2 -type d -name '*.xcodeproj' -print -quit || true)
          XCODE_WORKSPACE_ROOT=$(find . -maxdepth 2 -type d -name '*.xcworkspace' -print -quit || true)
          if [ -n "$XCODE_WORKSPACE_ROOT" ]; then
            WORKSPACE_PATH="-workspace $XCODE_WORKSPACE_ROOT"
          elif [ -n "$XCODE_PROJ_ROOT" ]; then
            WORKSPACE_PATH="-project $XCODE_PROJ_ROOT"
          fi
        fi
        echo "OUTDIR=$OUTDIR" >> $GITHUB_ENV
        echo "DERIVED=$DERIVED" >> $GITHUB_ENV
        echo "HOSTING_BASE=$HOSTING_BASE" >> $GITHUB_ENV
        echo "WORKSPACE_PATH=$WORKSPACE_PATH" >> $GITHUB_ENV

    - name: Inspect Xcode Schemes
      if: always()
      run: |
        set -eux || true
        echo "WORKSPACE_PATH='${{ env.WORKSPACE_PATH }}'"
        if [ -n "${{ env.WORKSPACE_PATH }}" ]; then
          xcodebuild -list ${{ env.WORKSPACE_PATH }} || true
        fi

    - name: Build documentation archive
      env:
        SCHEME: Demo
      run: |
        set -eux
        DERIVED=${DERIVED:-build}
        WORKSPACE_PATH="${WORKSPACE_PATH}"
        if [ -n "$WORKSPACE_PATH" ]; then
          xcodebuild docbuild -scheme "$SCHEME" $WORKSPACE_PATH -derivedDataPath "$DERIVED"
        else
          xcodebuild docbuild -scheme "$SCHEME" -derivedDataPath "$DERIVED" || true
        fi
        DOCARCHIVE=$(find "$DERIVED" -type d -name '*.doccarchive' -print -quit || true)
        if [ -z "$DOCARCHIVE" ]; then
          echo "##[error]No .doccarchive found."
          exit 1
        fi
        echo "DOCARCHIVE=$DOCARCHIVE" >> $GITHUB_ENV

    - name: Transform .doccarchive -> static site
      run: |
        set -eux
        OUTDIR=${OUTDIR:-docs}
        mkdir -p "$OUTDIR"
        DOCARCHIVE=${{ env.DOCARCHIVE }}
        $(xcrun --find docc) process-archive transform-for-static-hosting "$DOCARCHIVE" \
          --output-path "$OUTDIR" \
          --hosting-base-path "${HOSTING_BASE}"

    - name: Fallback: Fix absolute asset paths to relative in HTML
      run: |
        set -eux
        OUTDIR=${OUTDIR:-docs}
        python3 - "$OUTDIR" <<'PY'
import os, sys, pathlib, re

root = pathlib.Path(sys.argv[1])
if not root.exists():
    sys.exit(0)

host = os.environ.get("HOSTING_BASE", "/")
if not host.startswith("/"):
    host = "/" + host
if not host.endswith("/"):
    host = host + "/"
host_trim = host.strip("/")

if host_trim:
    patt_host = re.compile(r'(?P<attr>(?:src|href))=(?P<q>["\'])/' + re.escape(host_trim) + r'/?(?P<rest>[^"\'>\s]*)', flags=re.IGNORECASE)
    url_host = re.compile(r'url\(\s*(?P<q>["\']?)/' + re.escape(host_trim) + r'/?(?P<rest>[^)\'"]*)\s*(?P<q2>["\']?)\)', flags=re.IGNORECASE)
else:
    patt_host = None
    url_host = None

patt_generic = re.compile(r'(?P<attr>(?:src|href))=(?P<q>["\'])/(?P<rest>[^"\'>\s]+)', flags=re.IGNORECASE)
url_generic = re.compile(r'url\(\s*(?P<q>["\']?)/(?P<rest>[^)\'"]*)\s*(?P<q2>["\']?)\)', flags=re.IGNORECASE)

def fix_text(s):
    if patt_host:
        s = patt_host.sub(lambda m: f"{m.group('attr')}={m.group('q')}./{m.group('rest')}", s)
        s = url_host.sub(lambda m: f"url({m.group('q')}./{m.group('rest')}{m.group('q2')})", s)
    s = patt_generic.sub(lambda m: f"{m.group('attr')}={m.group('q')}./{m.group('rest')}", s)
    s = url_generic.sub(lambda m: f"url({m.group('q')}./{m.group('rest')}{m.group('q2')})", s)
    return s

changed = 0
for ext in ('*.html','*.htm','*.css','*.txt'):
    for f in root.rglob(ext):
        try:
            s = f.read_text(encoding='utf8')
        except Exception:
            continue
        s2 = fix_text(s)
        if s2 != s:
            f.write_text(s2, encoding='utf8')
            changed += 1
            print("Patched:", f)
print("Done; files changed:", changed)
PY

    - name: Ensure index.html exists
      run: |
        set -eux
        OUTDIR=${OUTDIR:-docs}
        if [ ! -f "$OUTDIR/index.html" ]; then
          echo "<!doctype html><meta http-equiv='refresh' content='0;url=tutorials/' />" > "$OUTDIR/index.html"
        fi

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs
        publish_branch: main
        user_name: github-actions[bot]
        user_email: 41898282+github-actions[bot]@users.noreply.github.com
